<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Painel de LED - Alvo Leds</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/png" href="assets/favicon.png">
<script type="module" src="/app.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#0e1621;
  --bg-card:#2a2f3a;
  --bg-card-light:#3a3f4a;
  --bg-sidebar:#1a1f2a;
  --bg-header:#0a0f14;
  --primary:#ffffff;
  --muted:#9aa4b2;
  --green:#22c55e;
  --yellow:#f1c40f;
  --orange:#f97316;
  --red:#ef4444;
  --gray:#6b7280;
}

*{
  box-sizing:border-box;
  font-family: 'Inter', Arial, sans-serif;
  margin:0;
  padding:0;
}

body{
  margin:0;
  background:var(--bg);
  color:var(--primary);
  min-height:100vh;
}

/* HEADER */
header{
  padding:20px 30px;
  display:flex;
  align-items:center;
  gap:16px;
  background:var(--bg-header);
  border-bottom:1px solid #1e2530;
  overflow:visible;
  position:relative;
  z-index:50;
}

.stores-container{
  display:flex;
  align-items:center;
  gap:12px;
  flex:1;
  overflow-x:auto;
}

.store-pill{
  padding:14px 20px;
  border-radius:999px;
  background:#1a1f2a;
  border:2px solid #2a3040;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:4px;
  cursor:pointer;
  transition:all .2s;
  min-width:140px;
  position:relative;
}

.store-pill:hover{
  border-color:#3a4050;
}

.store-pill.active{
  border-color:#22c55e;
  background:#252a35;
  box-shadow:0 0 0 1px #22c55e;
}

.store-pill.inactive{
  opacity:.5;
}

.store-pill .store-header{
  display:flex;
  align-items:center;
  gap:8px;
  font-weight:700;
  font-size:14px;
}

.store-pill .store-count{
  font-size:10px;
  color:var(--muted);
  display:flex;
  align-items:center;
  gap:4px;
}

.store-pill .store-count .dot{
  width:6px;
  height:6px;
  border-radius:50%;
  background:var(--green);
}

.store-pill.inactive .store-count .dot{
  background:var(--red);
}

.store-pill .power-btn{
  background:none;
  border:none;
  color:var(--muted);
  cursor:pointer;
  font-size:16px;
  padding:0;
  display:flex;
  align-items:center;
}

.store-pill .power-btn:hover{
  color:#fff;
}





/* LAYOUT */
.container{
  display:flex;
  min-height:calc(100vh - 80px);
}

/* SIDEBAR */
aside{
  width:200px;
  background:var(--bg-sidebar);
  padding:30px 0;
  border-right:1px solid #1e2530;
}

.nav-item{
  display:block;
  padding:12px 24px;
  color:var(--muted);
  text-decoration:none;
  font-size:15px;
  font-weight:500;
  cursor:pointer;
  transition:all .2s;
  border-left:3px solid transparent;
}

.nav-item:hover{
  color:#fff;
  background:rgba(255,255,255,0.03);
}

.nav-item.active{
  color:#fff;
  border-left-color:#fff;
  background:rgba(255,255,255,0.05);
}

.nav-item.sub{

  font-size:14px;
}

.btn-testar-email{
  display:block;
  margin:auto 16px 0;
  padding:10px 16px;
  background:transparent;
  border:1px solid #2a3040;
  border-radius:8px;
  color:var(--muted);
  font-size:12px;
  font-weight:500;
  cursor:pointer;
  transition:all .2s;
  text-align:center;
  width:calc(100% - 32px);
}
.btn-testar-email:hover{
  border-color:#3b82f6;
  color:#93c5fd;
  background:rgba(59,130,246,0.08);
}
.btn-testar-email:disabled{
  opacity:0.5;
  cursor:not-allowed;
}

/* Search Box */
.search-box{
  position:relative;
  width:350px;
  z-index:100;
}

.search-box input{
  width:100%;
  padding:12px 20px 12px 45px;
  border-radius:999px;
  border:2px solid #2a3040;
  background:#1a1f2a;
  color:#fff;
  font-size:14px;
  outline:none;
  transition:border-color .2s;
}

.search-box input:focus{
  border-color:#3a4050;
}

.search-box input::placeholder{
  color:var(--muted);
}

.search-icon{
  position:absolute;
  left:18px;
  top:50%;
  transform:translateY(-50%);
  color:var(--muted);
  pointer-events:none;
}

/* MAIN */
main{
  flex:1;
  padding:40px;
  background:var(--bg);
}

.main-header{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  margin-bottom:30px;
}

.main-header h1{
  font-size:42px;
  font-weight:900;
  margin:0;
  line-height:1;
}

.main-header h2{
  font-size:28px;
  font-weight:400;
  color:var(--muted);
  margin:8px 0 0 0;
}

.add-btn{
  width:50px;
  height:50px;
  border-radius:50%;
  border:2px solid #3a4050;
  background:transparent;
  color:#fff;
  font-size:28px;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  transition:all .2s;
}

.add-btn:hover{
  background:#2a3040;
  border-color:#4a5060;
}

/* CARDS */
.cards{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
  gap:20px;
  padding-bottom:120px;
  overflow:visible;
}

.card{
  background:var(--bg-card);
  border-radius:16px;
  overflow:visible;
  position:relative;
  cursor:pointer;
  transition:all .2s;
  z-index:1;
  display:flex;
  flex-direction:column;
  height:180px;
}

.card.show-actions{
  z-index:100;
}

.card:hover{
  transform:translateY(-2px);
}

.card[data-expirado="true"]{
  opacity:0.85;
  border:2px solid var(--red);
}

.card[data-expirado="true"] .card-content h3{
  color:var(--red);
}

.card-content{
  padding:20px 15px 12px;
  text-align:center;
  border-radius:16px 16px 0 0;
  overflow:hidden;
  flex:1;
  display:flex;
  flex-direction:column;
  justify-content:center;
}

.card h3{
  margin:0 0 10px 0;
  font-size:22px;
  font-weight:900;
  line-height:1.15;
  text-transform:uppercase;
  word-break:break-word;
  overflow:hidden;
  text-overflow:ellipsis;
  display:-webkit-box;
  -webkit-line-clamp:2;
  -webkit-box-orient:vertical;
  max-height:52px;
  min-height:26px;
  text-align:center;
  width:100%;
}

.card-dates{
  display:flex;
  justify-content:space-between;
  padding:8px 12px;
  background:rgba(255,255,255,0.95);
  color:#333;
  font-size:11px;
  border-radius:4px;
  margin: 46px 0 0 0;
}

.card-dates .date-group{
  text-align:center;
  flex:1;
}

.card-dates .date-label{
  font-weight:600;
  font-size:9px;
  text-transform:uppercase;
  color:#666;
  margin-bottom:2px;
}

.card-dates .date-value{
  font-weight:700;
  color:#000;
  font-size:11px;
}

.card-progress{
  height:8px;
  display:flex;
  border-radius:0 0 16px 16px;
  overflow:hidden;
  flex-shrink:0;
}

.card-progress .progress-fill{
  height:100%;
}

.card-progress .progress-empty{
  height:100%;
  background:#4a4f5a;
  flex:1;
}

/* Card Actions Balloon */
.card-actions{
  position:absolute;
  top:100%;
  left:50%;
  transform:translateX(-50%) translateY(-10px);
  width:calc(100% - 20px);
  min-width:200px;
  background:#fff;
  padding:15px;
  border-radius:12px;
  opacity:0;
  visibility:hidden;
  transition:all .3s cubic-bezier(0.4, 0, 0.2, 1);
  z-index:1000;
  box-shadow:0 8px 24px rgba(0,0,0,0.4);
  margin-top:10px;
  pointer-events:none;
}

/* Seta do balão */
.card-actions::before{
  content:'';
  position:absolute;
  bottom:100%;
  left:50%;
  transform:translateX(-50%);
  width:0;
  height:0;
  border-left:8px solid transparent;
  border-right:8px solid transparent;
  border-bottom:8px solid #fff;
}

.card.show-actions .card-actions{
  opacity:1 !important;
  visibility:visible !important;
  transform:translateX(-50%) translateY(0) !important;
  pointer-events:auto !important;
}

.card{
  cursor:pointer;
  transition:all .2s;
}

.card:hover{
  transform:translateY(-2px);
}

.btn-editar{
  width:100%;
  padding:10px;
  border:none;
  border-radius:8px;
  background:var(--orange);
  color:#fff;
  font-weight:600;
  font-size:13px;
  cursor:pointer;
  margin-bottom:8px;
}

.btn-editar:hover{
  background:#ea580c;
}

.btn-retirar{
  width:100%;
  padding:10px;
  border:none;
  border-radius:8px;
  background:var(--red);
  color:#fff;
  font-weight:600;
  font-size:13px;
  cursor:pointer;
  margin-bottom:8px;
}

.btn-retirar:hover{
  background:#dc2626;
}

.btn-remover{
  width:100%;
  padding:10px;
  border:1px solid rgba(34,197,94,0.5);
  border-radius:8px;
  background:rgba(34,197,94,0.1);
  color:#86efac;
  font-weight:700;
  font-size:13px;
  cursor:pointer;
  margin-bottom:8px;
  transition:all .2s;
}

.btn-remover:hover{
  background:rgba(34,197,94,0.2);
  border-color:var(--green);
  color:#fff;
}

.aprovado-badge{
  position:absolute;
  top:8px;
  right:8px;
  padding:3px 8px;
  border-radius:999px;
  background:rgba(34,197,94,0.15);
  border:1px solid rgba(34,197,94,0.35);
  color:#86efac;
  font-size:9px;
  font-weight:700;
  letter-spacing:0.5px;
  z-index:10;
  pointer-events:none;
}

.card[data-aprovado="true"]{
  border:2px solid rgba(34,197,94,0.4) !important;
  box-shadow:0 0 14px rgba(34,197,94,0.08);
}

.store-check-item{
  display:flex;
  align-items:center;
  gap:10px;
  padding:11px 14px;
  background:#1a1f2a;
  border:1px solid #2a3040;
  border-radius:8px;
  cursor:pointer;
  transition:border-color .2s;
  user-select:none;
}

.store-check-item:hover{
  border-color:#3a4050;
}

.store-check-item input[type="checkbox"]{
  width:16px;
  height:16px;
  accent-color:var(--green);
  cursor:pointer;
}

.store-check-item span{
  font-size:14px;
  font-weight:600;
  color:#fff;
}

.obs-container{
  display:flex;
  align-items:center;
  gap:8px;
  margin-bottom:8px;
}

.obs-container input[type="checkbox"]{
  width:14px;
  height:14px;
  cursor:pointer;
}

.obs-container label{
  font-size:12px;
  color:#333;
  cursor:pointer;
  user-select:none;
}

.card-actions .obs-input{
  color:#333;
}

.obs-input{
  width:100%;
  padding:8px 12px;
  border:1px solid #ddd;
  border-radius:6px;
  background:#f5f5f5;
  color:#333;
  font-size:12px;
}

.obs-input::placeholder{
  color:#999;
}

/* TABELA SAÍDAS */
.table-container{
  margin-top:10px;
}

table{
  width:100%;
  border-collapse:collapse;
}

th{
  text-align:left;
  padding:16px 20px;
  font-size:18px;
  font-weight:600;
  color:#fff;
}

th:first-child{
  width:40px;
  padding:16px 10px;
}

td{
  text-align:left;
  padding:14px 20px;
  font-size:15px;
  color:var(--muted);
  border-bottom:1px solid #1e2530;
}

.btn-view-saida{
  background:transparent;
  border:none;
  color:var(--orange);
  cursor:pointer;
  padding:4px;
  display:flex;
  align-items:center;
  justify-content:center;
  border-radius:4px;
  transition:all .2s;
}

.btn-view-saida:hover{
  background:rgba(249, 115, 22, 0.1);
  color:#fff;
}

.status-ok{color:var(--green);}
.status-early{color:var(--orange);}
.status-cancel{color:var(--red);}

/* BADGES LOJAS */
.lojas-badges{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
}

.loja-badge{
  padding:8px 16px;
  background:#2a3040;
  border:2px solid #3a4050;
  border-radius:8px;
  color:#fff;
  font-size:13px;
  font-weight:600;
  display:inline-block;
}

#saidaDetalhesImagem img,
#saidaDetalhesImagem video{
  width:100%;
  max-height:400px;
  object-fit:contain;
  display:block;
}

#saidaDetalhesImagem.empty{
  padding:60px 20px;
  text-align:center;
  color:var(--muted);
}

/* MÍDIAS GRID */
.midias-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
  gap:20px;
}

.midia-card{
  background:#d1d5db;
  border-radius:12px;
  aspect-ratio:16/10;
  overflow:hidden;
  position:relative;
}

.midia-card img{
  width:100%;
  height:100%;
  object-fit:cover;
}

.midia-card video{
  width:100%;
  height:100%;
  object-fit:cover;
}

.midia-info{
  color:var(--muted);
  font-size:14px;
  margin-top:10px;
}

/* MODAL */
.modal-overlay{
  position:fixed;
  top:0;
  left:0;
  right:0;
  bottom:0;
  background:rgba(0,0,0,0.7);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:1000;
}

.modal-overlay.active{
  display:flex;
}

.modal{
  background:var(--bg-card);
  border-radius:16px;
  padding:30px;
  width:90%;
  max-width:500px;
  max-height:90vh;
  overflow-y:auto;
}

.modal h3{
  margin:0 0 25px 0;
  font-size:24px;
}

.form-group{
  margin-bottom:20px;
}

.form-group label{
  display:block;
  margin-bottom:8px;
  font-size:14px;
  color:var(--muted);
}

.form-group input,
.form-group select{
  width:100%;
  padding:12px 16px;
  border:1px solid #3a4050;
  border-radius:10px;
  background:#1a1f2a;
  color:#fff;
  font-size:14px;
}

.form-group input[type="file"]{
  padding:10px;
}

/* Store selection */
.stores-selection{
  display:flex;
  flex-wrap:nowrap;

  overflow-x:auto;
}

.store-checkbox{
  display:flex;
  align-items:center;
  padding:8px 12px;
  background:#1a1f2a;
  border:2px solid #3a4050;
  border-radius:8px;
  cursor:pointer;
  transition:all .2s;
  user-select:none;
  white-space:nowrap;
  flex-shrink:0;
}

.store-checkbox.disabled{
  opacity:0.5;
  cursor:not-allowed;
  pointer-events:none;
}

.store-checkbox.disabled input[type="checkbox"]{
  cursor:not-allowed;
}

.store-checkbox:hover{
  border-color:var(--orange);
  background:#222834;
}

.store-checkbox input[type="checkbox"]{
  width:auto;
  margin:0 8px 0 0;
  cursor:pointer;
}

.store-checkbox input[type="checkbox"]:checked ~ span{
  color:var(--orange);
  font-weight:600;
}

.store-checkbox span{
  font-size:13px;
  color:#fff;
  transition:all .2s;
}

/* File upload area */
.file-upload-area{
  min-height:150px;
  position:relative;
}

.file-upload-content{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:12px;
  min-height:150px;
  padding:24px;
  border:2px dashed #3a4050;
  border-radius:12px;
  background:#1a1f2a;
  cursor:pointer;
  transition:all .3s;
}

.file-upload-content:hover{
  border-color:var(--orange);
  background:#222834;
}

.file-upload-content.drag-over{
  border-color:var(--green);
  background:#1e2a24;
  transform:scale(1.02);
}

.file-upload-content svg{
  color:var(--muted);
  transition:all .3s;
}

.file-upload-content:hover svg{
  color:var(--orange);
  transform:translateY(-4px);
}

.file-upload-text{
  display:flex;
  flex-direction:column;
  align-items:center;
  text-align:center;
}

.file-preview{
  position:relative;
  min-height:150px;
  border-radius:12px;
  overflow:hidden;
  background:#1a1f2a;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  padding:16px;
}

.file-preview img,
.file-preview video{
  max-width:100%;
  max-height:200px;
  border-radius:8px;
  margin-bottom:12px;
}

.file-info{
  font-size:13px;
  color:var(--muted);
  text-align:center;
}

.file-remove{
  position:absolute;
  top:8px;
  right:8px;
  width:32px;
  height:32px;
  border-radius:50%;
  border:none;
  background:var(--red);
  color:#fff;
  font-size:20px;
  font-weight:bold;
  cursor:pointer;
  transition:all .2s;
  display:flex;
  align-items:center;
  justify-content:center;
}

.file-remove:hover{
  transform:scale(1.1);
  background:#ff0000;
}

.modal-actions{
  display:flex;
  gap:12px;
  margin-top:25px;
}

.btn{
  flex:1;
  padding:14px;
  border:none;
  border-radius:10px;
  font-size:14px;
  font-weight:600;
  cursor:pointer;
  transition:all .2s;
}

.btn-primary{
  background:var(--green);
  color:#fff;
}

.btn-primary:hover{
  background:#16a34a;
}

.btn-secondary{
  background:#3a4050;
  color:#fff;
}

.btn-secondary:hover{
  background:#4a5060;
}

/* Empty State */
.empty-state{
  text-align:center;
  padding:60px 20px;
  color:var(--muted);
}

.empty-state p{
  font-size:16px;
}

/* Scrollbar */
::-webkit-scrollbar{
  width:8px;
  height:8px;
}

::-webkit-scrollbar-track{
  background:#1a1f2a;
}

::-webkit-scrollbar-thumb{
  background:#3a4050;
  border-radius:4px;
}

::-webkit-scrollbar-thumb:hover{
  background:#4a5060;
}
</style>
</head>

<body>

<!-- HEADER -->
<header>
  <div class="stores-container" id="stores"></div>
</header>

<!-- LAYOUT -->
<div class="container">
  <!-- SIDEBAR -->
  <aside id="sidebar" style="display:flex;flex-direction:column;">
    <a class="nav-item active" data-section="marcas">Marcas</a>
    <a class="nav-item sub" data-section="saidas">Saídas</a>
    <a class="nav-item" data-section="midias">Mídias</a>
    <div style="flex:1;"></div>
    <button class="btn-testar-email" id="btnCriarResumo" title="Gera um resumo visual com vencidos e próximos a vencer">📋 Criar Resumo</button>
    <button class="btn-testar-email" id="btnTestarEmail" title="Envia um email de teste agora">📧 Testar Email</button>
    <div style="height:20px;"></div>
  </aside>

  <!-- MAIN -->
  <main>
    <div class="main-header">
      <div>
        <h1 id="storeTitle">UNAMAR</h1>
        <h2 id="sectionTitle">Marcas</h2>
        <div id="saidasInfo" style="display:none;margin-top:8px;">
          <span style="color:var(--muted);font-size:14px;">Total de saídas: </span>
          <span id="totalSaidasCount" style="color:var(--orange);font-size:14px;font-weight:600;">0</span>
        </div>
      </div>
      <div style="display:flex;gap:12px;align-items:center;">
        <!-- SEARCH BOX -->
        <div class="search-box" id="searchBox" style="display:none;position:relative;top:auto;right:auto;">
          <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8"></circle>
            <path d="m21 21-4.35-4.35"></path>
          </svg>
          <input type="text" id="searchMarcas" placeholder="Buscar nas saídas..." autocomplete="off">
        </div>
        <button class="add-btn" id="addBtn" title="Adicionar">+</button>
      </div>
    </div>
    
    <!-- Conteúdo Dinâmico -->
    <div id="content">
      <!-- Marcas / Saídas / Mídias será renderizado aqui -->
    </div>
  </main>
</div>

<!-- MODAL CRIAR MARCA -->
<div class="modal-overlay" id="modalMarca">
  <div class="modal">
    <h3 id="modalMarcaTitle">Nova Marca</h3>
    <form id="formMarca">
      <input type="hidden" id="marcaEditId" value="">
      <div class="form-group">
        <label>Nome da Marca</label>
        <input type="text" id="marcaNome" required placeholder="Ex: REDBULL">
      </div>
      
      <div class="form-group">
        <label>Lojas</label>
        <div class="stores-selection">
          <label class="store-checkbox">
            <input type="checkbox" name="storeSelect" value="unamar">
            <span>UNA</span>
          </label>
          <label class="store-checkbox">
            <input type="checkbox" name="storeSelect" value="macae-ii">
            <span>MAC II</span>
          </label>
          <label class="store-checkbox">
            <input type="checkbox" name="storeSelect" value="bacaxa-ii">
            <span>BCX II</span>
          </label>
          <label class="store-checkbox">
            <input type="checkbox" name="storeSelect" value="copacabana">
            <span>CPC</span>
          </label>
          <label class="store-checkbox">
            <input type="checkbox" name="storeSelect" value="botafogo">
            <span>BTF</span>
          </label>
        </div>
      </div>
      
      <div class="form-group">
        <label>Data de Entrada</label>
        <input type="date" id="marcaEntrada" required>
      </div>
      <div class="form-group">
        <label>Data de Saída</label>
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px;">
          <input type="checkbox" id="saidaIndeterminada" style="width:auto;margin:0;">
          <label for="saidaIndeterminada" style="margin:0;color:var(--muted);font-size:14px;">Indeterminado</label>
        </div>
        <input type="date" id="marcaSaida" required>
      </div>
      
      <div class="form-group">
        <label>Mídia (imagem ou vídeo)</label>
        <div class="file-upload-area" id="fileUploadArea">
          <input type="file" id="marcaMidia" accept="image/*,video/*" style="display:none;">
          <div class="file-upload-content" id="fileUploadContent">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
              <polyline points="17 8 12 3 7 8"></polyline>
              <line x1="12" y1="3" x2="12" y2="15"></line>
            </svg>
            <div class="file-upload-text">
              <span style="color:#fff;font-weight:600;">Clique para escolher arquivo</span>
              <span style="color:var(--muted);font-size:13px;margin-top:4px;display:block;">ou arraste e solte aqui</span>
            </div>
          </div>
          <div class="file-preview" id="filePreview" style="display:none;">
            <img id="filePreviewImg" style="display:none;">
            <video id="filePreviewVideo" style="display:none;" muted></video>
            <div class="file-info" id="fileInfo"></div>
            <button type="button" class="file-remove" onclick="removeFile()">×</button>
          </div>
        </div>
      </div>
      
      <div class="modal-actions">
        <button type="button" class="btn btn-secondary" id="cancelMarca">Cancelar</button>
        <button type="submit" class="btn btn-primary" id="submitMarca">Criar Marca</button>
      </div>
    </form>
  </div>
</div>

<!-- MODAL RETIRAR -->
<div class="modal-overlay" id="modalRetirar">
  <div class="modal">
    <h3>Confirmar Retirada Antecipada</h3>
    <p style="color:var(--muted);margin-bottom:20px;">Esta marca está sendo retirada antes do prazo previsto.</p>
    <div class="form-group">
      <label>Observação <span style="color:var(--red)">*obrigatória</span></label>
      <input type="text" id="retirarObs" placeholder="Ex: Cliente solicitou, Cancelado..." required>
    </div>
    <div class="modal-actions">
      <button type="button" class="btn btn-secondary" id="cancelRetirar">Cancelar</button>
      <button type="button" class="btn btn-primary" id="confirmRetirar" style="background:var(--red);">Retirar</button>
    </div>
  </div>
</div>

<!-- MODAL DETALHES SAÍDA -->
<div class="modal-overlay" id="modalSaidaDetalhes">
  <div class="modal" style="max-width:600px;">
    <h3 id="saidaDetalhesNome">Detalhes da Saída</h3>
    
    <div id="saidaDetalhesImagem" style="margin:20px 0;border-radius:8px;overflow:hidden;background:#1a1f2a;">
      <!-- Imagem será inserida aqui -->
    </div>
    
    <div style="margin-top:20px;">
      <label style="display:block;margin-bottom:10px;font-weight:600;color:#fff;">Lojas Participantes:</label>
      <div id="saidaDetalhesLojas" class="lojas-badges">
        <!-- Badges das lojas serão inseridas aqui -->
      </div>
    </div>
    
    <div class="modal-actions">
      <button type="button" class="btn btn-secondary" id="closeSaidaDetalhes">Fechar</button>
    </div>
  </div>
</div>



<!-- MODAL RETIRAR LOJAS (seleção multi-loja) -->
<div class="modal-overlay" id="modalRetirarLojas">
  <div class="modal">
    <h3 style="margin-bottom:6px;">Retirar Marca</h3>
    <p style="color:var(--muted);font-size:14px;margin-bottom:4px;">
      Marca: <strong id="retirarLojasNome" style="color:#fff;"></strong>
    </p>
    <p style="color:var(--muted);font-size:13px;margin-bottom:18px;">
      Selecione as lojas de onde deseja retirar:
    </p>
    <div id="retirarLojasLista" style="display:flex;flex-direction:column;gap:8px;margin-bottom:20px;min-height:44px;"></div>
    <div class="form-group">
      <label style="display:flex;align-items:center;gap:6px;">
        Observação
        <span id="retirarLojasObsLabel" style="font-size:11px;color:var(--muted);"></span>
      </label>
      <input type="text" id="retirarLojasObs" placeholder="Ex: Cliente solicitou, Cancelado...">
    </div>
    <div class="modal-actions">
      <button type="button" class="btn btn-secondary" id="cancelRetirarLojas">Cancelar</button>
      <button type="button" class="btn" id="confirmRetirarLojas"
        style="background:var(--red);color:#fff;flex:2;">
        Retirar das lojas selecionadas
      </button>
    </div>
  </div>
</div>

<!-- Firebase SDKs -->
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-storage-compat.js"></script>

</body>
</html>
