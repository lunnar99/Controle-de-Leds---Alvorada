<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Resumo de Vencimentos – Alvo Leds</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" href="assets/favicon.png">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0e1621;
      --bg-card: #141c2d;
      --bg-card-hover: #1a2235;
      --bg-header: #090e16;
      --primary: #ffffff;
      --muted: #8a96a8;
      --green: #22c55e;
      --orange: #f97316;
      --red: #ef4444;
      --yellow: #f1c40f;
      --border: #1c2436;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
    body { background: var(--bg); color: var(--primary); min-height: 100vh; }

    /* ── HEADER ── */
    .page-header {
      background: var(--bg-header);
      border-bottom: 1px solid var(--border);
      padding: 18px 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(8px);
    }
    .header-brand { display: flex; flex-direction: column; gap: 2px; }
    .header-brand h1 { font-size: 20px; font-weight: 800; letter-spacing: 0.3px; }
    .header-date { font-size: 12px; color: var(--muted); }
    .header-actions { display: flex; gap: 10px; align-items: center; }
    .btn-hdr {
      padding: 9px 18px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all .2s;
      display: flex;
      align-items: center;
      gap: 7px;
      white-space: nowrap;
    }
    .btn-hdr:hover { background: rgba(255,255,255,0.05); color: #fff; border-color: #2e3a50; }
    .btn-hdr.green { border-color: rgba(34,197,94,0.4); color: #86efac; background: rgba(34,197,94,0.05); }
    .btn-hdr.green:hover { background: rgba(34,197,94,0.1); color: #fff; border-color: var(--green); }

    /* ── MAIN ── */
    main { padding: 36px 40px; max-width: 1400px; margin: 0 auto; }

    /* ── STATS ── */
    .stats-bar { display: flex; gap: 16px; margin-bottom: 40px; flex-wrap: wrap; }
    .stat-card {
      flex: 1; min-width: 140px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 18px 20px;
    }
    .stat-label { font-size: 10px; text-transform: uppercase; letter-spacing: 1.2px; color: var(--muted); font-weight: 600; margin-bottom: 6px; }
    .stat-value { font-size: 36px; font-weight: 900; line-height: 1; }
    .stat-value.red { color: var(--red); }
    .stat-value.orange { color: var(--orange); }
    .stat-value.white { color: #fff; }

    /* ── SECTION ── */
    .section { margin-bottom: 52px; }
    .section-header {
      display: flex; align-items: center; gap: 12px;
      margin-bottom: 22px;
      padding-bottom: 14px;
      border-bottom: 1px solid var(--border);
    }
    .section-title { font-size: 15px; font-weight: 700; letter-spacing: 1.2px; text-transform: uppercase; }
    .section-title.vencidos { color: var(--red); }
    .section-title.proximos { color: var(--orange); }
    .section-pill {
      padding: 3px 10px; border-radius: 999px; font-size: 11px; font-weight: 700;
    }
    .section-pill.vencidos { background: rgba(239,68,68,0.12); color: var(--red); }
    .section-pill.proximos { background: rgba(249,115,22,0.12); color: var(--orange); }

    /* ── GRID ── */
    .brands-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 20px;
    }

    /* ── BRAND CARD ── */
    .brand-card {
      background: var(--bg-card);
      border-radius: 16px;
      border: 1px solid var(--border);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      transition: transform .2s, box-shadow .2s;
    }
    .brand-card:hover { transform: translateY(-3px); box-shadow: 0 10px 32px rgba(0,0,0,0.35); }
    .brand-card.vencido { border-color: rgba(239,68,68,0.25); }
    .brand-card.proximo { border-color: rgba(249,115,22,0.18); }
    .brand-card.aprovado { border-color: rgba(34,197,94,0.35); background: #0f1c18; }

    /* IMAGE */
    .brand-image {
      height: 170px;
      background: #0d1420;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }
    .brand-image img, .brand-image video {
      width: 100%; height: 100%; object-fit: contain; padding: 10px;
    }
    .brand-image video { object-fit: cover; padding: 0; }
    .brand-initials {
      font-size: 52px; font-weight: 900; color: rgba(255,255,255,0.07);
      letter-spacing: -2px; user-select: none;
    }
    .expire-badge {
      position: absolute; top: 10px; right: 10px;
      padding: 4px 10px; border-radius: 999px;
      font-size: 10px; font-weight: 700; letter-spacing: 0.5px;
      backdrop-filter: blur(4px);
    }
    .expire-badge.vencido { background: rgba(239,68,68,0.85); color: #fff; }
    .expire-badge.proximo { background: rgba(249,115,22,0.85); color: #fff; }
    .expire-badge.hoje { background: rgba(241,196,15,0.9); color: #000; }

    /* BODY */
    .brand-body { padding: 18px 20px 14px; flex: 1; display: flex; flex-direction: column; gap: 10px; }
    .brand-name { font-size: 19px; font-weight: 800; text-transform: uppercase; line-height: 1.2; }
    .brand-date-row { display: flex; align-items: center; gap: 6px; font-size: 13px; }
    .brand-date { color: var(--muted); }
    .brand-days { font-weight: 600; }
    .brand-days.vencido { color: var(--red); }
    .brand-days.proximo { color: var(--orange); }
    .brand-days.hoje { color: var(--yellow); }
    .brand-stores { display: flex; flex-wrap: wrap; gap: 6px; }
    .store-badge {
      padding: 4px 10px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 6px;
      font-size: 11px; font-weight: 600;
      color: var(--muted);
    }

    /* FOOTER */
    .brand-footer { padding: 14px 20px; border-top: 1px solid var(--border); display: flex; flex-direction: column; gap: 8px; }
    .footer-btns { display: flex; gap: 8px; }
    .btn-confirmar {
      flex: 1; padding: 12px;
      border-radius: 10px;
      border: 1px solid rgba(239,68,68,0.35);
      background: rgba(239,68,68,0.07);
      color: #fca5a5;
      font-size: 13px; font-weight: 600;
      cursor: pointer;
      transition: all .2s;
      letter-spacing: 0.2px;
    }
    .btn-confirmar:hover:not(:disabled) {
      background: rgba(239,68,68,0.15);
      border-color: var(--red);
      color: #fff;
    }
    .btn-confirmar.loading { opacity: .6; cursor: wait; }
    .btn-confirmar.aprovado {
      border-color: rgba(34,197,94,0.4);
      background: rgba(34,197,94,0.07);
      color: #86efac;
      cursor: default;
    }
    .btn-confirmar.aprovado:hover { background: rgba(34,197,94,0.1); border-color: var(--green); }
    .btn-aindanao {
      flex: 1; padding: 12px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.04);
      color: var(--muted);
      font-size: 13px; font-weight: 600;
      cursor: pointer;
      transition: all .2s;
    }
    .btn-aindanao:hover { background: rgba(255,255,255,0.08); color: #fff; border-color: rgba(255,255,255,0.2); }

    /* MODAL */
    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.75); z-index: 1000;
      align-items: center; justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 28px 32px;
      width: 100%; max-width: 420px;
      display: flex; flex-direction: column; gap: 18px;
    }
    .modal h3 { font-size: 16px; font-weight: 700; color: #fff; margin: 0; }
    .modal-desc { font-size: 13px; color: var(--muted); margin: 0; }
    .modal-options { display: flex; flex-wrap: wrap; gap: 8px; }
    .modal-opt {
      padding: 9px 16px; border-radius: 8px;
      border: 1px solid var(--border);
      background: transparent; color: var(--muted);
      font-size: 13px; font-weight: 600; cursor: pointer;
      transition: all .2s;
    }
    .modal-opt:hover { background: rgba(255,255,255,0.06); color: #fff; border-color: #3a4050; }
    .modal-opt.selected { background: rgba(249,115,22,0.15); color: var(--orange); border-color: var(--orange); }
    .modal-specify { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--muted); cursor: pointer; }
    .modal-specify input[type=checkbox] { width: 15px; height: 15px; cursor: pointer; accent-color: var(--orange); }
    .modal-date-wrap { display: none; }
    .modal-date-wrap.open { display: block; }
    .modal-date-wrap input[type=date] {
      width: 100%; padding: 10px 12px;
      background: #0d1420; border: 1px solid var(--border);
      border-radius: 8px; color: #fff; font-size: 14px;
      color-scheme: dark;
    }
    .modal-actions { display: flex; gap: 8px; margin-top: 4px; }
    .btn-modal-cancel {
      flex: 1; padding: 12px; border-radius: 10px;
      border: 1px solid var(--border); background: transparent;
      color: var(--muted); font-size: 13px; font-weight: 600; cursor: pointer;
    }
    .btn-modal-confirm {
      flex: 1; padding: 12px; border-radius: 10px;
      border: 1px solid rgba(249,115,22,0.4); background: rgba(249,115,22,0.1);
      color: #fdba74; font-size: 13px; font-weight: 600; cursor: pointer;
      transition: all .2s;
    }
    .btn-modal-confirm:hover { background: rgba(249,115,22,0.2); color: #fff; border-color: var(--orange); }
    .btn-modal-confirm:disabled { opacity: .5; cursor: not-allowed; }

    /* ── LOADING ── */
    .loading-wrap { text-align: center; padding: 80px 20px; color: var(--muted); }
    .spinner {
      width: 44px; height: 44px;
      border: 3px solid rgba(255,255,255,0.08);
      border-top-color: var(--orange);
      border-radius: 50%;
      animation: spin .7s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── EMPTY ── */
    .empty-wrap {
      text-align: center; padding: 72px 20px;
      background: rgba(255,255,255,0.01);
      border: 1px dashed rgba(255,255,255,0.07);
      border-radius: 16px; color: var(--muted);
    }
    .empty-wrap .icon { font-size: 44px; margin-bottom: 12px; }
    .empty-wrap h2 { font-size: 18px; font-weight: 700; color: #fff; margin-bottom: 6px; }

    /* ── TOAST ── */
    .toast {
      position: fixed; bottom: 28px; right: 28px;
      padding: 13px 20px;
      border-radius: 10px;
      font-size: 13px; font-weight: 600;
      z-index: 9999;
      transform: translateY(80px); opacity: 0;
      transition: all .3s cubic-bezier(0.4,0,0.2,1);
      max-width: 340px;
      pointer-events: none;
    }
    .toast.show { transform: translateY(0); opacity: 1; }
    .toast.success { background: #166534; border: 1px solid var(--green); color: #86efac; }
    .toast.error { background: #7f1d1d; border: 1px solid var(--red); color: #fca5a5; }

    /* ── SCROLLBAR ── */
    ::-webkit-scrollbar { width: 7px; height: 7px; }
    ::-webkit-scrollbar-track { background: #0e1621; }
    ::-webkit-scrollbar-thumb { background: #2a3040; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #3a4050; }

    @media (max-width: 680px) {
      main { padding: 20px; }
      .page-header { padding: 14px 20px; flex-wrap: wrap; }
      .brands-grid { grid-template-columns: 1fr; }
      .stats-bar { flex-direction: column; }
      .header-actions .btn-hdr span { display: none; }
    }
  </style>
</head>
<body>

<!-- ── HEADER ── -->
<header class="page-header">
  <div class="header-brand">
    <h1>📊 Resumo de Vencimentos — Alvo Leds</h1>
    <span class="header-date" id="headerDate">Carregando…</span>
  </div>
  <div class="header-actions">
    <button class="btn-hdr" onclick="carregarResumo()" id="btnAtualizar">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
        <polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/>
        <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
      </svg>
      <span>Atualizar</span>
    </button>
    <button class="btn-hdr green" onclick="location.href='/'">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
        <polyline points="9 22 9 12 15 12 15 22"/>
      </svg>
      <span>Voltar ao Painel</span>
    </button>
  </div>
</header>

<!-- ── CONTENT ── -->
<main>
  <div id="dashboardContent">
    <div class="loading-wrap">
      <div class="spinner"></div>
      <p>Carregando dados…</p>
    </div>
  </div>
</main>

<!-- ── MODAL AINDA NÃO ── -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h3>⏳ Ainda não remover</h3>
    <p class="modal-desc" id="modalDesc">Por quanto tempo a marca ainda deve ficar?</p>
    <div class="modal-options" id="modalOptions">
      <button class="modal-opt" data-days="1" onclick="selecionarOpcao(this)">1 dia</button>
      <button class="modal-opt" data-days="3" onclick="selecionarOpcao(this)">3 dias</button>
      <button class="modal-opt" data-days="5" onclick="selecionarOpcao(this)">5 dias</button>
      <button class="modal-opt" data-days="7" onclick="selecionarOpcao(this)">1 semana</button>
      <button class="modal-opt" data-days="30" onclick="selecionarOpcao(this)">1 mês</button>
    </div>
    <label class="modal-specify">
      <input type="checkbox" id="chkEspecificar" onchange="toggleEspecificar(this)"> Especificar dia
    </label>
    <div class="modal-date-wrap" id="modalDateWrap">
      <input type="date" id="inputNovaData">
    </div>
    <div class="modal-actions">
      <button class="btn-modal-cancel" onclick="fecharModal()">Cancelar</button>
      <button class="btn-modal-confirm" id="btnModalConfirm" onclick="confirmarNovaData()" disabled>Confirmar</button>
    </div>
  </div>
</div>

<!-- ── TOAST ── -->
<div class="toast" id="toast"></div>

<!-- ── FIREBASE ── -->
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>

<script>
  /* ── FIREBASE INIT ── */
  const firebaseConfig = {
    apiKey: "AIzaSyBLiKdwjB77BR3XByLpbnpOkYM6L0wHr1Y",
    authDomain: "alvoleds-aab35.firebaseapp.com",
    projectId: "alvoleds-aab35",
    storageBucket: "alvoleds-aab35.firebasestorage.app",
    messagingSenderId: "397291431762",
    appId: "1:397291431762:web:2ff438e326bb5ae2f3fc8b"
  };
  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();

  const STORES = [
    { id: "unamar",      name: "UNAMAR"      },
    { id: "macae-ii",    name: "MACAÉ II"    },
    { id: "bacaxa-ii",   name: "BACAXÁ II"   },
    { id: "copacabana",  name: "COPACABANA"  },
    { id: "botafogo",    name: "BOTAFOGO"    }
  ];

  /* ── HELPERS ── */
  function calcDias(saida) {
    const hoje = new Date(); hoje.setHours(0, 0, 0, 0);
    const s = new Date(saida + "T00:00:00");
    return Math.round((s - hoje) / 86400000);
  }

  function fmtDias(d) {
    if (d < 0) { const n = Math.abs(d); return n === 1 ? "1 dia em atraso" : `${n} dias em atraso`; }
    if (d === 0) return "vence hoje";
    if (d === 1) return "1 dia restante";
    return `${d} dias restantes`;
  }

  function fmtData(iso) {
    const [y, m, d] = iso.split('-');
    return `${d}/${m}/${y}`;
  }

  function sanitizeId(nome, saida) {
    return nome.toLowerCase().replace(/[^a-z0-9]/g, '_') + '__' + saida.replace(/-/g, '');
  }

  function diasClass(d) {
    if (d < 0) return 'vencido';
    if (d === 0) return 'hoje';
    return 'proximo';
  }

  /* ── LOAD DATA ── */
  async function carregarResumo() {
    const btnAt = document.getElementById('btnAtualizar');
    btnAt.disabled = true;

    document.getElementById('dashboardContent').innerHTML = `
      <div class="loading-wrap">
        <div class="spinner"></div>
        <p>Carregando dados…</p>
      </div>`;

    const hoje = new Date(); hoje.setHours(0, 0, 0, 0);
    document.getElementById('headerDate').textContent =
      'Relatório de ' + hoje.toLocaleDateString('pt-BR', { day: '2-digit', month: '2-digit', year: 'numeric' });

    const brandMap = new Map();

    for (const store of STORES) {
      try {
        const snap = await db.collection("painel").doc(store.id).collection("marcas").get();
        snap.forEach(doc => {
          const d = doc.data();
          if (!d.saida || d.saida === 'indeterminado') return;
          const dias = calcDias(d.saida);
          if (dias > 3) return;

          const key = sanitizeId(d.nome, d.saida);
          if (!brandMap.has(key)) {
            brandMap.set(key, {
              key, nome: d.nome, saida: d.saida, dias,
              midiaUrl: d.midiaUrl || null,
              lojas: new Set(), lojaIds: new Set(),
              docIds: {}
            });
          }
          const e = brandMap.get(key);
          e.lojas.add(store.name);
          e.lojaIds.add(store.id);
          if (!e.midiaUrl && d.midiaUrl) e.midiaUrl = d.midiaUrl;
          if (!e.docIds) e.docIds = {};
          e.docIds[store.id] = doc.id;
        });
      } catch (err) {
        console.error('Erro loja', store.id, err);
      }
    }

    /* fetch approved removals */
    const aprovados = new Set();
    try {
      const ap = await db.collection("remocoes_aprovadas").get();
      ap.forEach(doc => aprovados.add(doc.id));
    } catch (_) {}

    const vencidos = [], proximos = [];
    brandMap.forEach((b) => {
      const entry = {
        ...b,
        lojas: Array.from(b.lojas).sort(),
        lojaIds: Array.from(b.lojaIds),
        docIds: b.docIds,
        aprovado: aprovados.has(b.key)
      };
      if (b.dias < 0) vencidos.push(entry);
      else proximos.push(entry);
    });

    vencidos.sort((a, b) => a.dias - b.dias || a.nome.localeCompare(b.nome));
    proximos.sort((a, b) => a.dias - b.dias || a.nome.localeCompare(b.nome));

    renderDashboard(vencidos, proximos);
    btnAt.disabled = false;
  }

  /* ── RENDER ── */
  function renderDashboard(vencidos, proximos) {
    const total = vencidos.length + proximos.length;

    if (total === 0) {
      document.getElementById('dashboardContent').innerHTML = `
        <div class="empty-wrap" style="margin-top:48px;">
          <div class="icon">✅</div>
          <h2>Tudo em dia!</h2>
          <p>Nenhuma marca vencida ou próxima do vencimento nos próximos 3 dias.</p>
        </div>`;
      return;
    }

    let html = `
      <div class="stats-bar">
        <div class="stat-card">
          <div class="stat-label">Vencidas</div>
          <div class="stat-value red">${vencidos.length}</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Próximas (≤ 3 dias)</div>
          <div class="stat-value orange">${proximos.length}</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Total de alertas</div>
          <div class="stat-value white">${total}</div>
        </div>
      </div>`;

    if (vencidos.length) {
      html += `
        <div class="section">
          <div class="section-header">
            <h2 class="section-title vencidos">Vencidos</h2>
            <span class="section-pill vencidos">${vencidos.length}</span>
          </div>
          <div class="brands-grid">
            ${vencidos.map(b => cardHtml(b, 'vencido')).join('')}
          </div>
        </div>`;
    }

    if (proximos.length) {
      html += `
        <div class="section">
          <div class="section-header">
            <h2 class="section-title proximos">Próximos a vencer — até 3 dias</h2>
            <span class="section-pill proximos">${proximos.length}</span>
          </div>
          <div class="brands-grid">
            ${proximos.map(b => cardHtml(b, 'proximo')).join('')}
          </div>
        </div>`;
    }

    document.getElementById('dashboardContent').innerHTML = html;
  }

  const brandDataMap = {}; // Armazena dados dos cards para acesso seguro

  function cardHtml(brand, tipo) {
    const initials = (brand.nome.match(/\b\w/g) || [brand.nome[0]]).slice(0, 3).join('').toUpperCase();
    const dc = diasClass(brand.dias);
    const dText = fmtDias(brand.dias);
    const dataFmt = fmtData(brand.saida);
    const isAprov = brand.aprovado;

    /* image area */
    let imgArea = `<div class="brand-initials">${initials}</div>`;
    if (brand.midiaUrl) {
      const isVid = /\.(mp4|webm|mov|avi)/i.test(brand.midiaUrl);
      imgArea = isVid
        ? `<video src="${brand.midiaUrl}" muted playsinline></video>`
        : `<img src="${brand.midiaUrl}" alt="${brand.nome}" onerror="this.style.display='none'">`;
    }

    /* badge text */
    const badgeClass = brand.dias < 0 ? 'vencido' : (brand.dias === 0 ? 'hoje' : 'proximo');
    const badgeText = brand.dias < 0
      ? `${Math.abs(brand.dias)} DIA${Math.abs(brand.dias) > 1 ? 'S' : ''} ATRASO`
      : (brand.dias === 0 ? 'VENCE HOJE' : `${brand.dias} DIA${brand.dias > 1 ? 'S' : ''}`);

    /* store badges */
    const storeBadges = brand.lojas.map(l => `<span class="store-badge">${l}</span>`).join('');

    /* confirm button(s) */
    const showAindaNao = brand.dias <= 0 && !isAprov;
    let footerContent;
    if (isAprov) {
      footerContent = `<button class="btn-confirmar aprovado" disabled>✓ Aprovado para remoção</button>`;
    } else if (showAindaNao) {
      footerContent =
        `<div class="footer-btns">` +
        `<button class="btn-confirmar" id="btn-${brand.key}" onclick="confirmarRemocao('${brand.key}')">🗑 Confirmar Remoção</button>` +
        `<button class="btn-aindanao" onclick="abrirModal('${brand.key}')">⏳ Ainda não</button>` +
        `</div>`;
    } else {
      footerContent = `<button class="btn-confirmar" id="btn-${brand.key}" onclick="confirmarRemocao('${brand.key}')">🗑 Confirmar Remoção</button>`;
    }

    // Armazenar dados do card de forma segura
    brandDataMap[brand.key] = {
      nome: brand.nome,
      saida: brand.saida,
      lojaIds: brand.lojaIds,
      docIds: brand.docIds
    };

    return `
      <div class="brand-card ${tipo}${isAprov ? ' aprovado' : ''}" id="card-${brand.key}">
        <div class="brand-image">
          ${imgArea}
          <span class="expire-badge ${badgeClass}">${badgeText}</span>
        </div>
        <div class="brand-body">
          <h3 class="brand-name">${brand.nome}</h3>
          <div class="brand-date-row">
            <span class="brand-date">📅 ${dataFmt}</span>
            <span class="brand-days ${dc}">• ${dText}</span>
          </div>
          <div class="brand-stores">${storeBadges}</div>
        </div>
        <div class="brand-footer">${footerContent}</div>
      </div>`;
  }

  /* ── CONFIRM REMOVAL ── */
  async function confirmarRemocao(key) {
    const btn = document.getElementById('btn-' + key);
    if (!btn || btn.disabled) return;

    const data = brandDataMap[key];
    if (!data) { console.error('Dados da marca não encontrados'); return; }

    const { nome, saida, lojaIds } = data;

    btn.disabled = true;
    btn.classList.add('loading');
    btn.textContent = 'Confirmando…';

    try {
      const batch = db.batch();
      batch.set(db.collection('remocoes_aprovadas').doc(key), {
        marcaNome: nome,
        dataSaida: saida,
        lojaIds,
        aprovadoEm: firebase.firestore.FieldValue.serverTimestamp()
      });
      batch.set(db.collection('decisoes_marcas').doc(), {
        marcaNome: nome,
        dataAntiga: saida,
        tipo: 'remocao',
        lojaIds,
        criadoEm: firebase.firestore.FieldValue.serverTimestamp()
      });
      await batch.commit();

      const card = document.getElementById('card-' + key);
      if (card) card.classList.add('aprovado');
      btn.classList.remove('loading');
      btn.classList.add('aprovado');
      btn.textContent = '✓ Aprovado para remoção';

      showToast('Marca aprovada! O botão "Remover" aparecerá no painel principal.', 'success');
    } catch (err) {
      console.error(err);
      btn.disabled = false;
      btn.classList.remove('loading');
      btn.textContent = '🗑 Confirmar Remoção';
      showToast('Erro ao confirmar remoção. Tente novamente.', 'error');
    }
  }

  /* ── MODAL "AINDA NÃO" ── */
  let modalCurrentKey = null;
  let modalSelectedDays = null;

  function abrirModal(key) {
    modalCurrentKey = key;
    modalSelectedDays = null;
    // reset state
    document.querySelectorAll('.modal-opt').forEach(b => b.classList.remove('selected'));
    document.getElementById('chkEspecificar').checked = false;
    document.getElementById('modalDateWrap').classList.remove('open');
    document.getElementById('inputNovaData').value = '';
    document.getElementById('btnModalConfirm').disabled = true;
    const data = brandDataMap[key];
    if (data) {
      document.getElementById('modalDesc').textContent =
        `Por quanto tempo a marca "${data.nome}" ainda deve ficar?`;
    }
    document.getElementById('modalOverlay').classList.add('open');
  }

  function fecharModal() {
    document.getElementById('modalOverlay').classList.remove('open');
    modalCurrentKey = null;
    modalSelectedDays = null;
  }

  function selecionarOpcao(btn) {
    document.querySelectorAll('.modal-opt').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    modalSelectedDays = parseInt(btn.dataset.days, 10);
    // uncheck custom date when fast option is picked
    document.getElementById('chkEspecificar').checked = false;
    document.getElementById('modalDateWrap').classList.remove('open');
    document.getElementById('inputNovaData').value = '';
    document.getElementById('btnModalConfirm').disabled = false;
  }

  function toggleEspecificar(chk) {
    const wrap = document.getElementById('modalDateWrap');
    if (chk.checked) {
      wrap.classList.add('open');
      // deselect quick options
      document.querySelectorAll('.modal-opt').forEach(b => b.classList.remove('selected'));
      modalSelectedDays = null;
      document.getElementById('btnModalConfirm').disabled = true;
      document.getElementById('inputNovaData').focus();
    } else {
      wrap.classList.remove('open');
      document.getElementById('inputNovaData').value = '';
      document.getElementById('btnModalConfirm').disabled = modalSelectedDays === null;
    }
  }

  document.getElementById('inputNovaData').addEventListener('change', function () {
    document.getElementById('btnModalConfirm').disabled = !this.value;
  });

  // Close modal on overlay click
  document.getElementById('modalOverlay').addEventListener('click', function (e) {
    if (e.target === this) fecharModal();
  });

  async function confirmarNovaData() {
    const key = modalCurrentKey;
    if (!key) return;
    const data = brandDataMap[key];
    if (!data) return;

    let novaData;
    const chk = document.getElementById('chkEspecificar');
    if (chk.checked) {
      novaData = document.getElementById('inputNovaData').value;
      if (!novaData) { showToast('Selecione uma data.', 'error'); return; }
    } else {
      if (modalSelectedDays === null) { showToast('Selecione uma opção.', 'error'); return; }
      const d = new Date();
      d.setDate(d.getDate() + modalSelectedDays);
      novaData = d.toISOString().slice(0, 10);
    }

    const confirmBtn = document.getElementById('btnModalConfirm');
    confirmBtn.disabled = true;
    confirmBtn.textContent = 'Salvando…';

    try {
      const batch = db.batch();

      // Update saida in each store's marca document
      for (const [lojaId, docId] of Object.entries(data.docIds || {})) {
        batch.update(
          db.collection('painel').doc(lojaId).collection('marcas').doc(docId),
          { saida: novaData }
        );
      }

      // Save decision for notification email
      batch.set(db.collection('decisoes_marcas').doc(), {
        marcaNome: data.nome,
        dataAntiga: data.saida,
        novaData,
        tipo: 'nova_data',
        lojaIds: data.lojaIds,
        criadoEm: firebase.firestore.FieldValue.serverTimestamp()
      });

      await batch.commit();

      fecharModal();
      showToast(`Nova data definida: ${novaData.split('-').reverse().join('/')}`, 'success');
      // Reload to reflect the new date
      setTimeout(() => carregarResumo(), 1200);
    } catch (err) {
      console.error(err);
      confirmBtn.disabled = false;
      confirmBtn.textContent = 'Confirmar';
      showToast('Erro ao salvar. Tente novamente.', 'error');
    }
  }

  /* ── TOAST ── */
  let toastTimer = null;
  function showToast(msg, type = 'success') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = `toast show ${type}`;
    if (toastTimer) clearTimeout(toastTimer);
    toastTimer = setTimeout(() => { t.className = 'toast'; }, 4000);
  }

  /* ── INIT ── */
  carregarResumo();
</script>
</body>
</html>
